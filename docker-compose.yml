services:
  vite-app:
    build: .
    ports:
      - "8080:80"
    networks:
      - caddy-net

  reverse-proxy:
    image: caddy:latest
    restart: always
    ports:
      - "8081:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - caddy-net

networks:
  caddy-net:
